<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>手机批量加水印</title>
  <meta name="description" content="适配手机浏览器的批量图片加水印工具，支持文字水印、透明 logo、预览、批量下载。">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <p class="eyebrow">Cloudflare Pages Ready</p>
      <h1>手机批量加水印</h1>
      <p class="lead">先选图，再调水印，最后导出。页面按手机单手操作重新收紧了，不让大预览先把屏幕占满。</p>
      <nav class="quick-nav">
        <a href="#imagesSection">选图</a>
        <a href="#settingsSection">设置</a>
        <a href="#exportSection">导出</a>
      </nav>
    </header>

    <main class="layout">
      <section id="imagesSection" class="panel panel-accent">
        <div class="section-head">
          <h2>1. 选择图片</h2>
          <span id="imageCount" class="badge">0 张</span>
        </div>
        <label class="upload-card">
          <input id="imagesInput" type="file" accept="image/*" multiple>
          <span class="upload-title">点这里选择多张图片</span>
          <span class="upload-subtitle">手机相册可直接多选。下面横向滑动切换当前预览图。</span>
        </label>
        <div id="thumbStrip" class="thumb-strip empty"></div>
      </section>

      <section id="settingsSection" class="panel">
        <div class="section-head">
          <h2>2. 水印设置</h2>
          <button id="resetBtn" class="ghost-btn" type="button">恢复默认</button>
        </div>

        <div class="field">
          <label>水印模板预设</label>
          <div class="preset-row">
            <button class="preset-btn" type="button" data-preset="light">默认淡白</button>
            <button class="preset-btn" type="button" data-preset="brand">品牌宣传</button>
            <button class="preset-btn" type="button" data-preset="bold">强提示</button>
          </div>
        </div>

        <div class="field">
          <label for="watermarkText">水印文字</label>
          <input id="watermarkText" type="text" value="© Watermark" placeholder="输入要叠加的文字">
        </div>

        <div class="grid two">
          <div class="field">
            <label for="opacityRange">文字透明度 <span id="opacityValue">110</span></label>
            <input id="opacityRange" type="range" min="20" max="255" value="110">
          </div>
          <div class="field">
            <label for="fontScaleRange">文字大小 <span id="fontScaleValue">1.0x</span></label>
            <input id="fontScaleRange" type="range" min="0.5" max="2" step="0.1" value="1">
          </div>
        </div>

        <div class="grid two">
          <div class="field">
            <label for="offsetX">X 偏移</label>
            <input id="offsetX" type="number" min="-1000" max="1000" value="0">
          </div>
          <div class="field">
            <label for="offsetY">Y 偏移</label>
            <input id="offsetY" type="number" min="-1000" max="1000" value="0">
          </div>
        </div>

        <div class="field">
          <label class="inline-label" for="logoInput">
            <span>透明 Logo</span>
            <span id="logoName" class="muted">未选择</span>
          </label>
          <input id="logoInput" type="file" accept="image/png,image/webp,image/*">
        </div>

        <div class="grid two">
          <div class="field">
            <label for="logoOpacityRange">Logo 透明度 <span id="logoOpacityValue">200</span></label>
            <input id="logoOpacityRange" type="range" min="30" max="255" value="200">
          </div>
          <div class="field">
            <label for="logoScaleRange">Logo 大小 <span id="logoScaleValue">1.0x</span></label>
            <input id="logoScaleRange" type="range" min="0.3" max="2" step="0.1" value="1">
          </div>
        </div>

        <div class="field">
          <label for="namingMode">批量命名规则</label>
          <select id="namingMode">
            <option value="suffix">原文件名 + _watermarked</option>
            <option value="prefix">自定义前缀 + 原文件名</option>
            <option value="sequence">批量序号命名</option>
            <option value="timestamp">时间戳命名</option>
          </select>
        </div>

        <div class="field">
          <label for="namePrefix">命名前缀 / 序号前缀</label>
          <input id="namePrefix" type="text" value="wm" placeholder="例如：brand、门店名、wm">
        </div>
      </section>

      <section id="exportSection" class="panel preview-panel">
        <div class="section-head">
          <h2>3. 预览与导出</h2>
          <span id="statusPill" class="badge badge-soft">等待图片</span>
        </div>

        <div class="preview-meta">
          <div>
            <p class="preview-kicker">当前预览</p>
            <p id="currentFileName" class="current-file">还没选择图片</p>
          </div>
          <button id="togglePreviewBtn" class="ghost-btn compact-btn" type="button">展开预览</button>
        </div>

        <div id="previewStage" class="preview-stage compact">
          <canvas id="previewCanvas"></canvas>
          <div id="previewEmpty" class="preview-empty">选择图片后，这里会显示第一张图的预览效果。</div>
        </div>

        <div class="progress-block">
          <div class="progress-meta">
            <span id="progressText">未开始</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <p class="compat-note">兼容处理已补强：对部分 iPhone 浏览器增加图片解码和导出降级逻辑，失败时会优先走更稳妥的本地转换。</p>
      </section>
    </main>
  </div>

  <div class="bottom-bar">
    <button id="previewBtn" class="secondary-btn" type="button">刷新预览</button>
    <button id="downloadCurrentBtn" class="secondary-btn" type="button">下载当前</button>
    <button id="downloadAllBtn" class="primary-btn" type="button">批量 ZIP</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
