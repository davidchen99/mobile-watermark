<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>手机批量加水印</title>
  <meta name="description" content="适配手机浏览器的批量图片加水印工具，支持文字水印、Logo 水印、预览和手机导出。">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <p class="eyebrow">Mobile First</p>
      <h1>手机批量加水印</h1>
      <p class="lead">选图、加字、预览、导出。手机上先保证结果明确能拿到，再考虑后续转发和存相册。</p>
    </header>

    <main class="layout">
      <section class="panel panel-accent">
        <div class="section-head">
          <h2>选择图片</h2>
          <span id="imageCount" class="badge">0 张</span>
        </div>
        <label class="upload-card">
          <input id="imagesInput" type="file" accept="image/*" multiple>
          <span class="upload-title">选择多张图片</span>
          <span class="upload-subtitle">选完后横向切换缩略图。点缩略图右上角的 × 可删除。</span>
        </label>
        <div id="thumbStrip" class="thumb-strip empty"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>水印设置</h2>
          <button id="resetBtn" class="ghost-btn" type="button">恢复默认</button>
        </div>

        <div class="field">
          <label for="watermarkText">水印文字</label>
          <input id="watermarkText" type="text" value="© Watermark" placeholder="输入要叠加的文字">
        </div>

        <div class="field">
          <label>文字颜色</label>
          <div id="textColorPicker" class="color-row">
            <button class="color-chip active" type="button" data-color="#ffffff" aria-label="白色"></button>
            <button class="color-chip" type="button" data-color="#111111" aria-label="黑色"></button>
            <button class="color-chip" type="button" data-color="#d7263d" aria-label="红色"></button>
            <button class="color-chip" type="button" data-color="#f4b400" aria-label="黄色"></button>
            <button class="color-chip" type="button" data-color="#2563eb" aria-label="蓝色"></button>
            <button class="color-chip" type="button" data-color="#16a34a" aria-label="绿色"></button>
            <button class="color-chip" type="button" data-color="#6b7280" aria-label="灰色"></button>
            <button class="color-chip" type="button" data-color="#ea580c" aria-label="橙色"></button>
          </div>
        </div>

        <div class="grid two">
          <div class="field">
            <label for="opacityRange">文字透明度 <span id="opacityValue">110</span></label>
            <input id="opacityRange" type="range" min="20" max="255" value="110">
          </div>
          <div class="field">
            <label for="fontScaleRange">文字大小 <span id="fontScaleValue">1.0x</span></label>
            <input id="fontScaleRange" type="range" min="0.5" max="2" step="0.1" value="1">
          </div>
        </div>

        <div class="field">
          <label class="inline-label" for="logoInput">
            <span>透明 Logo</span>
            <span id="logoName" class="muted">未选择</span>
          </label>
          <input id="logoInput" type="file" accept="image/png,image/webp,image/*">
        </div>

        <div class="grid two">
          <div class="field">
            <label for="logoOpacityRange">Logo 透明度 <span id="logoOpacityValue">200</span></label>
            <input id="logoOpacityRange" type="range" min="30" max="255" value="200">
          </div>
          <div class="field">
            <label for="logoScaleRange">Logo 大小 <span id="logoScaleValue">1.0x</span></label>
            <input id="logoScaleRange" type="range" min="0.3" max="2" step="0.1" value="1">
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>预览</h2>
          <span id="statusPill" class="badge badge-soft">等待图片</span>
        </div>

        <div class="preview-meta">
          <div>
            <p class="preview-kicker">当前图片</p>
            <p id="currentFileName" class="current-file">还没选择图片</p>
          </div>
          <button id="togglePreviewBtn" class="ghost-btn compact-btn" type="button">展开预览</button>
        </div>

        <div id="previewStage" class="preview-stage compact">
          <canvas id="previewCanvas"></canvas>
          <div id="previewEmpty" class="preview-empty">选择图片后，这里会显示效果。</div>
        </div>

        <div class="progress-block">
          <div class="progress-meta">
            <span id="progressText">未开始</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <p id="saveHint" class="compat-note">单张下载会直接生成明确图片文件。批量导出会生成结果面板，方便逐张保存或分享。</p>
      </section>
    </main>
  </div>

  <div class="bottom-bar">
    <button id="previewBtn" class="secondary-btn" type="button">刷新预览</button>
    <button id="downloadCurrentBtn" class="secondary-btn" type="button">下载当前</button>
    <button id="downloadAllBtn" class="primary-btn" type="button">批量导出全部</button>
  </div>

  <div class="site-credit">制作者：陆上行舟　联系邮箱：1455234504@qq.com</div>

  <div id="resultsSheet" class="sheet hidden">
    <div id="sheetBackdrop" class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-head">
        <div>
          <p class="sheet-kicker">批量结果</p>
          <h3 id="sheetTitle">已生成 0 张图片</h3>
        </div>
        <button id="closeSheetBtn" class="ghost-btn compact-btn" type="button">关闭</button>
      </div>

      <div class="sheet-actions">
        <button id="downloadSheetAllBtn" class="secondary-btn" type="button">全部下载</button>
        <button id="shareSheetAllBtn" class="primary-btn" type="button">全部分享</button>
      </div>

      <div id="resultsList" class="results-list"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
